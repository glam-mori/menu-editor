<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お品書きエディタ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ten+Mincho&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-app: #f5f5f5;
            --bg-panel: #ebebeb;
            --bg-surface: #ffffff;
            --bg-item-row: #fafafa;
            --ink: #1a1a1a;
            --ink-sub: #666666;
            --ink-muted: #999999;
            --accent: #8B4513;
            --accent-dark: #6b3410;
            --accent-light: rgba(139, 69, 19, 0.15);
            --danger: #9c2e2a;
            --danger-dark: #7a2320;
            --line: #d4d4d4;
            --line-soft: #e5e5e5;
            --font-serif: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
            --font-sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            color: var(--ink);
            letter-spacing: 0.03em;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--bg-app);
        }

        /* ===== HEADER ===== */
        #app-header {
            background: var(--bg-surface);
            flex-shrink: 0;
        }
        .header-top-rule {
            height: 3px;
            background: var(--accent);
            position: relative;
        }
        .header-top-rule::after {
            content: '';
            display: block;
            position: absolute;
            left: 0; right: 0;
            top: 4px;
            height: 1px;
            background: var(--accent);
        }
        .header-inner {
            padding: 20px 24px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-seal-wrapper {
            position: relative;
            width: 40px;
            height: 40px;
        }
        .header-seal-shadow {
            position: absolute;
            top: 2px; left: 2px;
            width: 40px; height: 40px;
            background: var(--accent-light);
        }
        .header-seal {
            position: relative;
            width: 40px;
            height: 40px;
            background: var(--danger);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 17px;
            font-weight: 500;
            transform: rotate(-2deg);
            border: 1.5px solid var(--danger-dark);
        }
        .header-title-block {
            display: flex;
            flex-direction: column;
        }
        .header-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--ink);
            line-height: 1.2;
        }
        .header-subtitle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .header-rule-short {
            display: inline-block;
            width: 12px;
            height: 1px;
            background: var(--accent);
        }
        .header-subtitle-text {
            font-family: var(--font-serif);
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 0.3em;
        }
        .header-bottom-rule {
            position: relative;
            height: 9px;
            background:
                linear-gradient(to bottom,
                    var(--accent) 0, var(--accent) 1px,
                    #fff 1px, #fff 3px,
                    var(--accent) 3px, var(--accent) 4px,
                    #fff 4px, #fff 6px,
                    var(--accent) 6px, var(--accent) 9px);
        }

        /* ===== LAYOUT ===== */
        #app-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #preview-wrapper {
            flex: 1;
            overflow: auto;
            background-color: var(--bg-panel);
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #canvas-scale-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            background: white;
            border: 0.5px solid var(--line-soft);
            box-shadow: 1px 1px 0 rgba(0,0,0,0.04);
            overflow: hidden;
            transform-origin: top left;
        }

        #canvas-content {
            width: 100%;
            height: 100%;
        }

        #form-wrapper {
            width: 420px;
            min-width: 320px;
            overflow: hidden;
            background: var(--bg-panel);
            border-left: 1px solid var(--line);
            display: flex;
            flex-direction: column;
        }

        #output-tab-panel {
            display: none;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 767px) {
            body { padding-bottom: 56px; }

            #app-wrapper {
                flex-direction: column;
                height: calc(100vh - 56px);
            }

            #preview-wrapper {
                display: none;
                flex: 1;
                padding: 1rem;
            }
            #preview-wrapper.tab-active { display: flex; }

            #form-wrapper {
                display: none;
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--line);
                flex: 1;
                min-width: 0;
            }
            #form-wrapper.tab-active { display: flex; }

            #output-tab-panel {
                display: none;
                flex: 1;
                padding: 1.5rem;
                overflow-y: auto;
                background: var(--bg-panel);
            }
            #output-tab-panel.tab-active { display: block; }

            #desktop-output-section { display: none !important; }
            #tab-bar { display: flex !important; }

            .header-inner { padding: 12px 16px; }
            .header-title { font-size: 15px; }
            .header-subtitle-text { font-size: 9px; }

            .btn-control {
                width: 40px;
                height: 40px;
            }
            .btn {
                min-height: 44px;
            }
            .drag-handle {
                width: 30px;
                height: 40px;
            }

            #app-footer { display: none; }
        }

        @media (min-width: 768px) {
            #preview-wrapper { display: flex !important; }
            #form-wrapper { display: flex !important; }
            #output-tab-panel { display: none !important; }
            #tab-bar { display: none !important; }
        }

        /* ===== TAB BAR ===== */
        #tab-bar {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 56px;
            background: var(--bg-surface);
            border-top: 1px solid var(--line);
            z-index: 100;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--ink-muted);
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px 0;
            min-height: 44px;
            min-width: 44px;
            position: relative;
        }
        .tab-btn.active {
            color: var(--accent);
            font-weight: 500;
        }
        .tab-btn.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 25%;
            right: 25%;
            height: 2px;
            background: var(--accent);
        }
        .tab-btn svg { width: 20px; height: 20px; margin-bottom: 2px; }

        /* ===== FORM ELEMENTS ===== */
        .form-input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 2px;
            padding: 8px 12px;
            font-size: 14px;
            line-height: 1.4;
            font-family: var(--font-serif);
            background: var(--bg-surface);
            color: var(--ink);
            letter-spacing: 0.05em;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 2px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: var(--font-serif);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-label {
            font-family: var(--font-serif);
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 0.35rem;
        }

        .btn {
            padding: 9px 18px;
            border-radius: 2px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: background-color 0.15s, color 0.15s;
            font-size: 13px;
            font-family: var(--font-serif);
            letter-spacing: 0.1em;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background-color: var(--accent);
            color: #fff;
            border: 1px solid var(--accent);
            box-shadow: 2px 2px 0 var(--accent-light);
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-dark);
            border-color: var(--accent-dark);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .btn-danger:hover:not(:disabled) {
            background-color: var(--danger);
            color: #fff;
        }

        .btn-secondary {
            background-color: var(--bg-surface);
            color: var(--ink);
            border: 1px solid var(--line);
        }
        .btn-secondary:hover:not(:disabled) {
            border-color: var(--ink);
        }

        .btn-control {
            background-color: var(--bg-surface);
            color: var(--accent);
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            border: 1px solid var(--accent);
            cursor: pointer;
            padding: 0;
        }
        .btn-control:hover { background-color: var(--accent); color: #fff; }
        .btn-control svg { width: 1rem; height: 1rem; stroke-width: 2.5; }

        .btn-control-danger {
            background-color: var(--bg-surface);
            color: var(--danger);
            border-color: var(--danger);
        }
        .btn-control-danger:hover { background-color: var(--danger); color: #fff; }

        /* ===== 2-TIER ROWS ===== */
        .item-row-1 {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .item-row-2 {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            padding-left: 54px;
        }
        .item-row-2.item-indent { padding-left: 70px; }

        .drag-handle {
            cursor: move;
            color: var(--accent);
            opacity: 0.7;
            flex-shrink: 0;
            width: 24px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            letter-spacing: -2px;
        }
        .drag-handle.item-handle { margin-left: 8px; opacity: 0.5; font-size: 0.9rem; }

        .form-checkbox {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .form-input-grow { flex-grow: 1; min-width: 0; }

        .font-size-label {
            font-family: var(--font-serif);
            font-size: 0.78rem;
            color: var(--ink-sub);
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }
        .font-size-display {
            font-family: var(--font-serif);
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--ink);
            min-width: 2.8rem;
            flex-shrink: 0;
            text-align: center;
            border-bottom: 0.5px solid var(--line);
            padding-bottom: 2px;
        }
        .size-display {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--ink);
            min-width: 3.5rem;
            text-align: right;
            flex-shrink: 0;
        }

        .sortable-ghost { opacity: 0.4; background: var(--accent-light) !important; }

        /* ===== CATEGORY/ITEM BLOCKS ===== */
        .category-block {
            border: 1px solid var(--line);
            border-top: none;
            background: var(--bg-surface);
            margin-bottom: 12px;
            position: relative;
            padding: 0;
        }

        .category-block::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            pointer-events: none;
        }

        .category-block::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 4px;
            background:
                linear-gradient(to bottom,
                    var(--accent) 0, var(--accent) 2px,
                    #fff 2px, #fff 3px,
                    var(--accent) 3px, var(--accent) 4px);
            pointer-events: none;
        }

        .category-block > .item-row-1,
        .category-block > .item-row-2 {
            padding-left: 18px;
            padding-right: 14px;
        }
        .category-block > .item-row-1 {
            padding-top: 14px;
        }
        .category-block > .item-row-2 {
            padding-bottom: 12px;
            border-bottom: 0.5px solid var(--line-soft);
        }

        .category-block > .items-list {
            background: var(--bg-item-row);
            padding: 10px 14px 10px 18px;
            margin-top: 0 !important;
            padding-top: 10px !important;
            border-top: none !important;
        }

        .category-block > button[data-add-item-cat-id] {
            margin: 10px 14px 14px 18px;
            width: calc(100% - 32px);
        }

        .item-block {
            padding: 6px 0;
            border-bottom: 0.5px solid var(--line-soft);
        }
        .item-block:last-child { border-bottom: none; }

        /* ===== ACCORDION ===== */
        details {
            background: var(--bg-surface);
            border: 1px solid var(--line);
            border-top: none;
            position: relative;
            margin-bottom: 14px;
        }
        details::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 3px;
            background: var(--accent);
            pointer-events: none;
        }
        details > summary {
            cursor: pointer;
            user-select: none;
            list-style: none;
            padding: 14px 16px;
            font-family: var(--font-serif);
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: 0.15em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details > summary::-webkit-details-marker { display: none; }
        details > summary::after {
            content: '＋';
            font-family: var(--font-serif);
            font-size: 1.1em;
            color: var(--accent);
        }
        details[open] > summary::after { content: '−'; }

        /* ===== SECTION TITLE ===== */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 12px;
        }
        .section-title-rule {
            flex: 1;
            height: 0.5px;
            background: var(--accent);
        }
        .section-title-diamond {
            width: 5px;
            height: 5px;
            background: var(--accent);
            transform: rotate(45deg);
            flex-shrink: 0;
        }
        .section-title-text {
            font-family: var(--font-serif);
            font-size: 12px;
            letter-spacing: 0.3em;
            color: var(--accent);
            font-weight: 500;
            flex-shrink: 0;
        }

        /* ===== OUTPUT SECTION ===== */
        #desktop-output-section {
            padding: 16px;
            border-top: 1px solid var(--line);
            background: var(--bg-surface);
            position: relative;
        }
        #desktop-output-section::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 3px;
            height: 1px;
            background: var(--accent);
        }
        .output-section-title {
            font-family: var(--font-serif);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--ink);
            margin: 0 0 10px;
        }

        #output-tab-panel {
            background: var(--bg-panel);
        }

        /* ===== FOOTER ===== */
        #app-footer {
            flex-shrink: 0;
            background: var(--bg-surface);
        }
        .footer-rule {
            height: 9px;
            background:
                linear-gradient(to bottom,
                    var(--accent) 0, var(--accent) 3px,
                    #fff 3px, #fff 5px,
                    var(--accent) 5px, var(--accent) 6px,
                    #fff 6px, #fff 8px,
                    var(--accent) 8px, var(--accent) 9px);
        }

        /* ===== PRINT ===== */
        @media print {
            #app-header, #app-footer, #tab-bar { display: none !important; }
            body * { visibility: hidden; }
            #canvas, #canvas * { visibility: visible; }
            #canvas {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                border: none !important;
                box-shadow: none !important;
                transform: none !important;
            }
            body { background: white !important; }
        }
    </style>
</head>
<body>

<!-- ========== Header ========== -->
<header id="app-header">
    <div class="header-top-rule"></div>
    <div class="header-inner">
        <div class="header-brand">
            <div class="header-seal-wrapper">
                <div class="header-seal-shadow"></div>
                <div class="header-seal">品</div>
            </div>
            <div class="header-title-block">
                <div class="header-title">御品書之編集</div>
                <div class="header-subtitle">
                    <span class="header-rule-short"></span>
                    <span class="header-subtitle-text">O S H I N A G A K I</span>
                    <span class="header-rule-short"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="header-bottom-rule"></div>
</header>

<div id="app-wrapper">

    <!-- LEFT: Preview -->
    <div id="preview-wrapper" class="tab-active">
        <div id="canvas-scale-wrapper">
            <div id="canvas">
                <div id="canvas-content"></div>
            </div>
        </div>
    </div>

    <!-- RIGHT: Form -->
    <div id="form-wrapper">
        <div class="p-4 flex-1 overflow-y-auto" id="form-content-wrapper">

            <!-- Title -->
            <div class="mb-3" id="title-form-group">
                <label class="form-label">大見出し</label>
                <div class="item-row-1">
                    <input type="text" id="form-title" class="form-input form-input-grow">
                </div>
                <div class="item-row-2" style="padding-left:0;">
                    <span class="font-size-label">Size:</span>
                    <span class="font-size-display" id="title-font-size-display">18px</span>
                    <button class="btn btn-control" data-style-op="h1-font-dec">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 12H6"/></svg>
                    </button>
                    <button class="btn btn-control" data-style-op="h1-font-inc">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m6-6H6"/></svg>
                    </button>
                </div>
            </div>

            <!-- Global settings accordion -->
            <details id="global-settings-details">
                <summary>全体設定</summary>
                <div class="p-3 pt-1 grid grid-cols-2 gap-3" id="global-settings-content">
                    <!-- filled by renderForm() -->
                </div>
            </details>

            <!-- Section title: 献立構成 -->
            <div class="section-title">
                <span class="section-title-rule"></span>
                <span class="section-title-diamond"></span>
                <span class="section-title-text">献 立 構 成</span>
                <span class="section-title-diamond"></span>
                <span class="section-title-rule"></span>
            </div>

            <!-- Categories -->
            <div id="categories-form-list"></div>

            <!-- Add / delete -->
            <div class="flex gap-2 mt-3">
                <button id="add-category-btn" class="btn btn-primary flex-grow" style="min-height:44px;">＋ 中見出しを追加</button>
                <button id="delete-selected-btn" class="btn btn-danger" style="min-height:44px; white-space:nowrap;">選択削除</button>
            </div>

        </div>

        <!-- Desktop output section -->
        <div id="desktop-output-section">
            <h3 class="output-section-title">出力メニュー</h3>
            <div class="flex flex-col gap-2">
                <button id="export-pdf-btn" class="btn btn-primary w-full" style="min-height:44px; font-size:15px;">
                    📸 PDF出力（推奨）
                </button>
                <button id="browser-print-btn" class="btn btn-secondary w-full" style="min-height:44px; font-size:13px;">
                    🖨️ ブラウザ印刷（予備）
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-1">※PDF生成に数秒かかります。印刷は「PDFに保存」を選択してください。</p>
        </div>
    </div>

    <!-- Mobile output tab panel -->
    <div id="output-tab-panel">
        <h3 class="font-bold text-gray-700 mb-4 text-lg">出力メニュー</h3>
        <div class="flex flex-col gap-3">
            <button id="export-pdf-btn-mobile" class="btn btn-primary w-full" style="min-height:56px; font-size:17px;">
                📸 PDF出力（推奨）
            </button>
            <button id="browser-print-btn-mobile" class="btn btn-secondary w-full" style="min-height:44px;">

<script>

const SVG_TRASH = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>`;

// ===== CANVAS SIZE & SCALE =====
function updateCanvasStyle() {
    const { canvasWidth, canvasHeight, fontFamily } = menuData.styles;
    const canvasW = canvasWidth  * MM_TO_PX;
    const canvasH = canvasHeight * MM_TO_PX;

    canvasEl.style.width    = `${canvasW}px`;
    canvasEl.style.height   = `${canvasH}px`;
    canvasEl.style.fontFamily = fontFamily;

    const pad   = 40;
    const availW = Math.max(100, previewWrapper.clientWidth  - pad);
    const availH = Math.max(100, previewWrapper.clientHeight - pad);
    currentScale = Math.min(availW / canvasW, availH / canvasH, 1);

    canvasEl.style.transform       = `scale(${currentScale})`;
    canvasEl.style.transformOrigin = 'top left';

    canvasScaleWrapper.style.width  = `${canvasW * currentScale}px`;
    canvasScaleWrapper.style.height = `${canvasH * currentScale}px`;
}

// ===== PREVIEW RENDER =====
function buildPaperOrnamentSVG(position) {

            <line x1="0" y1="3" x2="200" y2="3" stroke="#8B4513" stroke-width="0.9"/>

            <rect x="88" y="10" width="4" height="4" fill="#8B4513" transform="rotate(45 90 12)"/>
            <circle cx="100" cy="12" r="2.2" fill="none" stroke="#8B4513" stroke-width="0.6"/>
            <circle cx="100" cy="12" r="0.9" fill="#8B4513"/>
            <rect x="108" y="10" width="4" height="4" fill="#8B4513" transform="rotate(45 110 12)"/>
        </svg>`;
    } else {
        return `
        <svg viewBox="0 0 200 18" style="width:100%; height:18px; display:block;" preserveAspectRatio="none">
            <rect x="88" y="4" width="4" height="4" fill="#8B4513" transform="rotate(45 90 6)"/>

            <line x1="0" y1="15" x2="200" y2="15" stroke="#8B4513" stroke-width="0.9"/>

    }
}

function renderPreview() {

    canvasContent.style.cssText = 'width:100%; height:100%; padding: 2.5rem 2rem; overflow:hidden; display:flex; flex-direction:column;';

    // === 上部装飾 ===

    topDecor.style.cssText = 'flex-shrink:0; margin-bottom:12px;';
    topDecor.innerHTML = buildPaperOrnamentSVG('top');
    canvasContent.appendChild(topDecor);

    // === タイトル ===
    const h1 = document.createElement('h1');
    h1.style.cssText = `font-size:${menuData.titleFontSize}px; font-weight:bold; text-align:center; margin:0 0 1.5rem; letter-spacing:0.2em; flex-shrink:0;`;
    h1.textContent = menuData.title;
    canvasContent.appendChild(h1);

    // === カテゴリ本体 ===
    const body = document.createElement('div');
    body.style.cssText = 'flex:1;';
    canvasContent.appendChild(body);

    const { lineHeightH2, lineHeightP } = menuData.styles;

    menuData.categories.forEach((category) => {
        const section = document.createElement('section');
        section.style.marginBottom = '1.5rem';

        const h2 = document.createElement('h2');
        h2.style.cssText = [
            `position:relative`,
            `color:#A4252A`,
            `font-size:${category.fontSizeH2}px`,
            `font-weight:bold`,
            `margin:0 0 0.75rem`,
            `line-height:${lineHeightH2}px`,
            `text-align:center`,
            `letter-spacing:0.25em`
        ].join(';');

        const span = document.createElement('span');
        span.textContent = category.name;
        h2.appendChild(span);
        section.appendChild(h2);

        category.items.forEach(item => {
            const p = document.createElement('p');
            p.style.cssText = `text-align:center; font-size:${item.fontSizeP}px; line-height:${lineHeightP}px; margin:0;`;
            p.textContent = item.name;
            section.appendChild(p);
        });

        body.appendChild(section);
    });

    // === 下部装飾 ===
    const bottomDecor = document.createElement('div');
    bottomDecor.style.cssText = 'flex-shrink:0; margin-top:12px;';
    bottomDecor.innerHTML = buildPaperOrnamentSVG('bottom');
    canvasContent.appendChild(bottomDecor);

function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function refreshBulkDisplays() {
    const h2d = document.getElementById('all-h2-font-display');
    const pd  = document.getElementById('all-p-font-display');
    if (h2d && menuData.categories.length > 0) {
        const avg = menuData.categories.reduce((s,c) => s + c.fontSizeH2, 0) / menuData.categories.length;
        h2d.textContent = avg.toFixed(0) + ' px';
    }
    if (pd) {
        const items = menuData.categories.flatMap(c => c.items);
        if (items.length > 0) {
            const avg = items.reduce((s,i) => s + i.fontSizeP, 0) / items.length;
            pd.textContent = avg.toFixed(0) + ' px';
        }
    }
}

// ===== SORTABLE =====
function initSortable() {
    new Sortable(categoriesFormList, {
        handle: '.cat-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        forceFallback: true,
        fallbackTolerance: 3,
        onEnd: (evt) => {
            const [item] = menuData.categories.splice(evt.oldIndex, 1);
            menuData.categories.splice(evt.newIndex, 0, item);
            renderAll();
        }
    });
    document.querySelectorAll('.items-list').forEach(list => {
        new Sortable(list, {
            handle: '.item-handle',
            animation: 150,
            ghostClass: 'sortable-ghost',
            forceFallback: true,
            fallbackTolerance: 3,
            onEnd: (evt) => {
                const catId = evt.from.dataset.catId;
                const cat = menuData.categories.find(c => c.id === catId);
                if (cat) {
                    const [item] = cat.items.splice(evt.oldIndex, 1);
                    cat.items.splice(evt.newIndex, 0, item);
                    renderAll();
                }
            }
        });
    });
}

function renderAll() {
    updateCanvasStyle();
    renderPreview();
    renderForm();
}

// ===== PDF EXPORT =====
async function handleExportPDF() {
    const btns = document.querySelectorAll('#export-pdf-btn, #export-pdf-btn-mobile');
    btns.forEach(b => { b.textContent = '処理中…'; b.disabled = true; });

    try {
        // Detect if mobile
        const isMobile = window.innerWidth < 768;

        await document.fonts.ready;

        try {
            const ff = menuData.styles.fontFamily;
            await Promise.all([
                document.fonts.load(`bold ${menuData.titleFontSize}px ${ff}`),
                document.fonts.load(`16px ${ff}`)
            ]);
        } catch (_) {}

        canvasEl.style.transform       = 'scale(1)';
        canvasEl.style.transformOrigin = 'top left';
        const fw = menuData.styles.canvasWidth  * MM_TO_PX;
        const fh = menuData.styles.canvasHeight * MM_TO_PX;
        canvasScaleWrapper.style.width  = `${fw}px`;
        canvasScaleWrapper.style.height = `${fh}px`;

        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        // Use lower pixelRatio on mobile to avoid memory issues
        // Mobile: 2.0, Desktop: 3.125 (300/96)
        const pixelRatio = isMobile ? 2.0 : (300 / 96);
        console.log(`PDF Export: isMobile=${isMobile}, pixelRatio=${pixelRatio}, canvasSize=${fw}x${fh}px`);

        let dataUrl;

        // Try htmlToImage first (better quality)
        try {
            dataUrl = await htmlToImage.toPng(canvasEl, {
                quality: 1.0,
                pixelRatio: pixelRatio,
                cacheBust: true,
                style: { margin: '0' }
            });
            console.log('htmlToImage capture successful');
        } catch (htmlErr) {
            console.error('htmlToImage failed:', htmlErr);
            console.log('Falling back to canvas.toDataURL()...');

            // Fallback: Use native canvas.toDataURL() for better mobile compatibility
            try {
                // Create a temporary canvas with proper dimensions
                const tempCanvas = document.createElement('canvas');
                const ctx = tempCanvas.getContext('2d', { willReadFrequently: true });

                tempCanvas.width = fw;
                tempCanvas.height = fh;

                // Set white background
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, fw, fh);

                // Draw the canvas element
                await new Promise((resolve) => {
                    setTimeout(() => {
                        try {
                            ctx.drawImage(canvasEl, 0, 0);
                            dataUrl = tempCanvas.toDataURL('image/png', 0.95);
                            resolve();
                        } catch (drawErr) {
                            console.error('Canvas draw failed:', drawErr);
                            resolve(); // Continue anyway, might still work
                        }
                    }, 100);
                });

                if (!dataUrl) {
                    dataUrl = tempCanvas.toDataURL('image/png', 0.95);
                }
                console.log('canvas.toDataURL fallback successful');
            } catch (fallbackErr) {
                console.error('Fallback also failed:', fallbackErr);
                throw new Error(`キャンバス取得に失敗: htmlToImage と canvas.toDataURL の両方が使えません`);
            }
        }

        canvasEl.style.transform = `scale(${currentScale})`;
        canvasScaleWrapper.style.width  = `${fw * currentScale}px`;
        canvasScaleWrapper.style.height = `${fh * currentScale}px`;

        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

            const a4W = 210, a4H = 297;
            const cw = menuData.styles.canvasWidth;
            const ch = menuData.styles.canvasHeight;
            const mx = (a4W / 2 - cw) / 2;
            const my = (a4H - ch) / 2;

            pdf.addImage(dataUrl, 'PNG', mx,           my, cw, ch);
            pdf.addImage(dataUrl, 'PNG', a4W / 2 + mx, my, cw, ch);
            pdf.save('お品書き.pdf');
            console.log('PDF save successful');
        } catch (pdfErr) {
            console.error('PDF generation failed:', pdfErr);
            throw new Error(`PDF生成エラー: ${pdfErr.message}`);
        }

    } catch (err) {
        console.error('PDF export error:', err);
        const fw = menuData.styles.canvasWidth  * MM_TO_PX;
        const fh = menuData.styles.canvasHeight * MM_TO_PX;
        canvasEl.style.transform = `scale(${currentScale})`;
        canvasScaleWrapper.style.width  = `${fw * currentScale}px`;
        canvasScaleWrapper.style.height = `${fh * currentScale}px`;

        let errorMsg = 'PDF生成に失敗しました。\n「ブラウザ印刷」ボタンをお試しください。';
        if (err.message) {
            errorMsg += `\n\n詳細: ${err.message}`;
        }
        alert(errorMsg);
    } finally {
        btns.forEach(b => { b.textContent = '📸 PDF出力（推奨）'; b.disabled = false; });
    }
}

// ===== TAB SWITCHING =====
function setupTabs() {
    document.getElementById('tab-bar').addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        const tab = btn.dataset.tab;

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        previewWrapper.classList.remove('tab-active');
        formWrapper.classList.remove('tab-active');
        outputTabPanel.classList.remove('tab-active');

        if (tab === 'preview') {
            previewWrapper.classList.add('tab-active');
            requestAnimationFrame(() => updateCanvasStyle());
        } else if (tab === 'form') {
            formWrapper.classList.add('tab-active');
        } else if (tab === 'output') {
            outputTabPanel.classList.add('tab-active');
        }
    });
}

// ===== EVENT LISTENERS =====
function setupListeners() {
    formContentWrapper.addEventListener('input', (e) => {
        const t = e.target;
        if (t.id === 'form-font-family') {
            menuData.styles.fontFamily = t.value;
            canvasEl.style.fontFamily  = t.value;
            renderPreview(); return;
        }
        if (t.id === 'form-title') {
            menuData.title = t.value;
            renderPreview(); return;
        }
        const catId  = t.dataset.catId;
        const itemId = t.dataset.itemId;
        if (catId && t.type === 'text') {
            const cat = menuData.categories.find(c => c.id === catId);
            if (cat) { cat.name = t.value; renderPreview(); }
        }
        if (itemId && t.type === 'text') {
            for (const cat of menuData.categories) {
                const item = cat.items.find(i => i.id === itemId);
                if (item) { item.name = t.value; renderPreview(); break; }
            }
        }
        if (catId  && t.type === 'checkbox') {
            const cat = menuData.categories.find(c => c.id === catId);
            if (cat) cat.isChecked = t.checked;
        }
        if (itemId && t.type === 'checkbox') {
            for (const cat of menuData.categories) {
                const item = cat.items.find(i => i.id === itemId);
                if (item) { item.isChecked = t.checked; break; }
            }
        }
    });

    formContentWrapper.addEventListener('click', (e) => {
        // カテゴリーの上下移動
        const moveCatUpBtn = e.target.closest('[data-move-cat-up]');
        if (moveCatUpBtn) {
            const catId = moveCatUpBtn.dataset.moveCatUp;
            const idx = menuData.categories.findIndex(c => c.id === catId);
            if (idx > 0) {
                [menuData.categories[idx - 1], menuData.categories[idx]] = [menuData.categories[idx], menuData.categories[idx - 1]];
                renderAll();
            }
            return;
        }

        const moveCatDownBtn = e.target.closest('[data-move-cat-down]');
        if (moveCatDownBtn) {
            const catId = moveCatDownBtn.dataset.moveCatDown;
            const idx = menuData.categories.findIndex(c => c.id === catId);
            if (idx >= 0 && idx < menuData.categories.length - 1) {
                [menuData.categories[idx], menuData.categories[idx + 1]] = [menuData.categories[idx + 1], menuData.categories[idx]];
                renderAll();
            }
            return;
        }

        const delBtn = e.target.closest('.btn-control-danger');
        if (delBtn) {
            const dCat  = delBtn.dataset.deleteCatId;
            const dItem = delBtn.dataset.deleteItemId;
            if (dCat)  { menuData.categories = menuData.categories.filter(c => c.id !== dCat); renderAll(); }
            if (dItem) { menuData.categories.forEach(c => { c.items = c.items.filter(i => i.id !== dItem); }); renderAll(); }
            return;
        }

        const ctrlBtn = e.target.closest('.btn-control:not(.btn-control-danger)');
        if (ctrlBtn) {
            const op     = ctrlBtn.dataset.styleOp;
            const catId  = ctrlBtn.dataset.catId;
            const itemId = ctrlBtn.dataset.itemId;
            if (!op) return;

            const s = menuData.styles;
            let needAll = false, needPreview = false, needCanvas = false;

            switch (op) {
                case 'canvas-w-inc': s.canvasWidth  = Math.min(105, s.canvasWidth  + 1); needCanvas = true; break;
                case 'canvas-w-dec': s.canvasWidth  = Math.max(10,  s.canvasWidth  - 1); needCanvas = true; break;
                case 'canvas-h-inc': s.canvasHeight = Math.min(297, s.canvasHeight + 1); needCanvas = true; break;
                case 'canvas-h-dec': s.canvasHeight = Math.max(50,  s.canvasHeight - 1); needCanvas = true; break;
                case 'h2-line-inc': s.lineHeightH2 += 1; needPreview = true; break;
                case 'h2-line-dec': s.lineHeightH2 = Math.max(8, s.lineHeightH2 - 1); needPreview = true; break;
                case 'p-line-inc':  s.lineHeightP  += 1; needPreview = true; break;
                case 'p-line-dec':  s.lineHeightP  = Math.max(8, s.lineHeightP  - 1); needPreview = true; break;
                case 'h1-font-inc': menuData.titleFontSize += 1; needPreview = true; break;
                case 'h1-font-dec': menuData.titleFontSize = Math.max(8, menuData.titleFontSize - 1); needPreview = true; break;
                case 'all-h2-font-inc': menuData.categories.forEach(c => c.fontSizeH2 += 1); needAll = true; break;
                case 'all-h2-font-dec': menuData.categories.forEach(c => c.fontSizeH2 = Math.max(8, c.fontSizeH2 - 1)); needAll = true; break;
                case 'all-p-font-inc':  menuData.categories.forEach(c => c.items.forEach(i => i.fontSizeP += 1)); needAll = true; break;
                case 'all-p-font-dec':  menuData.categories.forEach(c => c.items.forEach(i => i.fontSizeP = Math.max(8, i.fontSizeP - 1))); needAll = true; break;
                case 'h2-font-inc': case 'h2-font-dec': {
                    const cat = menuData.categories.find(c => c.id === catId);
                    if (cat) {
                        cat.fontSizeH2 = op === 'h2-font-inc' ? cat.fontSizeH2 + 1 : Math.max(8, cat.fontSizeH2 - 1);
                        const d = document.querySelector(`[data-cat-size="${catId}"]`);
                        if (d) d.textContent = `${cat.fontSizeH2}px`;
                        needPreview = true;
                    }
                    break;
                }
                case 'p-font-inc': case 'p-font-dec': {
                    for (const cat of menuData.categories) {
                        const item = cat.items.find(i => i.id === itemId);
                        if (item) {
                            item.fontSizeP = op === 'p-font-inc' ? item.fontSizeP + 1 : Math.max(8, item.fontSizeP - 1);
                            const d = document.querySelector(`[data-item-size="${itemId}"]`);
                            if (d) d.textContent = `${item.fontSizeP}px`;
                            needPreview = true;
                            break;
                        }
                    }
                    break;
                }
            }

            if (needCanvas) {
                updateCanvasStyle();
                const wd = document.getElementById('canvas-w-input');
                const hd = document.getElementById('canvas-h-input');
                if (wd) wd.value = s.canvasWidth.toFixed(0);
                if (hd) hd.value = s.canvasHeight.toFixed(0);
                renderPreview(); return;
            }
            if (op === 'h2-line-inc' || op === 'h2-line-dec') {
                const d = document.getElementById('h2-line-display');
                if (d) d.textContent = s.lineHeightH2.toFixed(0) + ' px';
            }
            if (op === 'p-line-inc'  || op === 'p-line-dec') {
                const d = document.getElementById('p-line-display');
                if (d) d.textContent = s.lineHeightP.toFixed(0) + ' px';
            }
            if (op === 'h1-font-inc' || op === 'h1-font-dec') {
                document.getElementById('title-font-size-display').textContent = `${menuData.titleFontSize}px`;
            }

            if (needAll) { renderAll(); }
            else if (needPreview) { renderPreview(); }
            return;
        }

        if (e.target.id === 'add-category-btn') {
            menuData.categories.push({ id: crypto.randomUUID(), name: "新しい中見出し", isChecked: false, fontSizeH2: 20, items: [] });
            renderAll(); return;
        }
        if (e.target.id === 'delete-selected-btn') {
            menuData.categories.forEach(c => { c.items = c.items.filter(i => !i.isChecked); });
            menuData.categories = menuData.categories.filter(c => !c.isChecked);
            renderAll(); return;
        }
        const addItemBtn = e.target.closest('[data-add-item-cat-id]');
        if (addItemBtn) {
            const cat = menuData.categories.find(c => c.id === addItemBtn.dataset.addItemCatId);
            if (cat) { cat.items.push({ id: crypto.randomUUID(), name: "新しい品名", isChecked: false, fontSizeP: 16 }); renderAll(); }
            return;
        }
    });

    // キャンバスサイズの直接入力（イベントデリゲーション）
    formContentWrapper.addEventListener('change', (e) => {
        if (e.target.id === 'canvas-w-input') {
            let val = parseFloat(e.target.value);
            val = Math.max(10, Math.min(105, val));
            menuData.styles.canvasWidth = val;
            e.target.value = val.toFixed(0);
            updateCanvasStyle();
            renderPreview();
        }
        if (e.target.id === 'canvas-h-input') {
            let val = parseFloat(e.target.value);
            val = Math.max(50, Math.min(500, val));
            menuData.styles.canvasHeight = val;
            e.target.value = val.toFixed(0);
            updateCanvasStyle();
            renderPreview();
        }
    });

    document.addEventListener('click', (e) => {
        if (e.target.id === 'export-pdf-btn' || e.target.id === 'export-pdf-btn-mobile') {
            handleExportPDF();
        } else if (e.target.id === 'browser-print-btn' || e.target.id === 'browser-print-btn-mobile') {
            window.print();
        }
    });

    window.addEventListener('resize', () => updateCanvasStyle());
}

// ===== INIT =====
function init() {
    renderAll();
    setupListeners();
    setupTabs();
}

init();
</script>

</html>
